name: ring_alarm
description: mùa thu ngủ say trong sắc vàng, báo thức là đánh thức giấc mơ.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  vibration: ^3.1.3
  file_picker: ^10.1.2
  video_player: ^2.8.2
  better_player_plus: ^1.0.8
  permission_handler: ^12.0.0+1
  intl: ^0.20.2
  flutter_foreground_task: ^7.0.0
  wakelock_plus: ^1.3.2
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  flutter_native_splash: ^2.4.6
  flutter_tts: ^3.8.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/app_icon.png
    - assets/videos/sample.mp4
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700  
  # Localization settings
flutter_localizations:
  sdk: flutter
flutter_intl:
  enabled: true
flutter_gen:
  enabled: true
  outputs:
    gen_l10n: lib/l10n

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/icon/app_icon.png
  android: true
  ios: true